[build]
  publish = "/"

[[redirects]]
  from = "/whatsapp"
  to = "/whatsapp.html"
  status = 200

[[redirects]]
  from = "/zap"
  to = "/whatsapp.html"
  status = 200

[[redirects]]
  from = "/instagram"
  to = "https://www.instagram.com/quintalvivogo/"
  status = 302

[[redirects]]
  from = "/maps"
  to = "https://www.google.com/maps/search/?api=1&query=Para%C3%BAna%2C%20GO"
  status = 302

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    Referrer-Policy = "strict-origin-when-cross-origin"
